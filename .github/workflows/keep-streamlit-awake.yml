name: Keep Streamlit app awake

# Streamlit Community Cloud puts apps to sleep after ~7 days of no traffic.
# This workflow pings the Lynn Data Dive app every 6 hours so it stays warm
# for visitors landing on https://maxwellhowegis.com/Lynn-data-dive/ (which
# iframes https://lynn-data-dive.streamlit.app/).
#
# Free alternative to a paid Streamlit subscription. To disable, delete this
# file or comment out the `schedule` block.

on:
  schedule:
    # Every 6 hours, on the hour. Cron is in UTC.
    - cron: "0 */6 * * *"
  workflow_dispatch: # allows a manual run from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake Lynn Data Dive
        run: |
          echo "Pinging Streamlit app at $(date -u)"
          # -L follows redirects, -s silent, -o /dev/null discards body,
          # -w prints just the status code, --max-time caps the wait.
          status=$(curl -L -s -o /dev/null -w "%{http_code}" --max-time 60 \
            "https://lynn-data-dive.streamlit.app/?keepalive=1")
          echo "Status: $status"
          # Accept any 2xx/3xx as a successful wake. A 503 here often means
          # the app is mid-spinup, which is fine — the ping itself woke it.
          if [ "$status" -lt 200 ] || { [ "$status" -ge 400 ] && [ "$status" -ne 503 ]; }; then
            echo "Unexpected status — failing the job so it's visible in Actions."
            exit 1
          fi
