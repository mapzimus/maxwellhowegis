# Self-hosted PostGIS for Open Concord (run on your VPS).
#   docker compose up -d
# The database is the pipeline's source of truth. It does NOT need to be exposed
# to the public internet — the website serves a STATIC export (PMTiles + Parquet).
# Keep port 5432 firewalled to the host / your IP only.
services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: openconcord-postgis
    restart: unless-stopped
    environment:
      POSTGRES_DB: openconcord
      POSTGRES_USER: ${PGUSER:-openconcord}
      POSTGRES_PASSWORD: ${PGPASSWORD:?set PGPASSWORD in .env}
    ports:
      - "127.0.0.1:5432:5432"   # bind to localhost only; tunnel in via SSH
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./inst/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-openconcord} -d openconcord"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  pgdata:
