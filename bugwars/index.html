<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bug Wars — Maxwell Howe GIS</title>
  <meta name="description" content="Bug Wars: a browser real-time strategy game. Command an ant colony in a backyard war — gather, build, and destroy the rival nest.">
  <link rel="icon" type="image/svg+xml" href="../images/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== Top bar ===== -->
  <header class="topbar">
    <div class="leftgroup">
      <a href="../portfolio.html" class="back-link" title="Back to portfolio">↩ <span class="bl-text">portfolio</span></a>
      <div class="brand">
        <span class="logo">🐜</span>
        <span class="title">BUG WARS</span>
        <span class="tag">Ants · vertical slice</span>
      </div>
    </div>
    <div class="stats">
      <div class="stat"><span class="label">Food</span><span id="foodCount" class="val">0</span></div>
      <div class="stat"><span class="label">Pop</span><span id="popCount" class="val">0/0</span></div>
      <div class="stat"><span class="label">Wave</span><span id="waveCount" class="val">0</span></div>
      <div class="stat"><span class="label">Selected</span><span id="selCount" class="val">0</span></div>
      <button id="pauseBtn" class="ctrl" title="Pause / resume (P)">⏸ Pause</button>
    </div>
  </header>

  <!-- ===== Play area ===== -->
  <main class="stage">
    <canvas id="gameCanvas" width="1280" height="720"></canvas>
    <div id="pauseBadge" class="pause-badge">PAUSED</div>
    <div id="toast" class="toast"></div>

    <!-- Win / lose overlay -->
    <div id="overlay" class="overlay">
      <div class="overlay-card">
        <h1 id="overlayTitle">Victory</h1>
        <p id="overlayMsg"></p>
        <button class="ctrl big" data-action="restart">↻ Play again</button>
      </div>
    </div>
  </main>

  <!-- ===== Build panel ===== -->
  <footer class="panel">
    <div class="hint">
      <b>Left-click</b> select · <b>drag</b> box-select · <b>right-click</b> move / attack ·
      your <b>workers gather on their own</b> &amp; idle fighters defend — build an army and smash the red nest.
    </div>
    <div class="buildbar">
      <button class="trainbtn" data-kind="worker">
        <span class="bk">Worker</span><span class="bc">🍞 50</span><span class="bh">1</span>
        <span class="bd">gathers food</span>
      </button>
      <button class="trainbtn" data-kind="soldier">
        <span class="bk">Soldier</span><span class="bc">🍞 80</span><span class="bh">2</span>
        <span class="bd">tanky frontline</span>
      </button>
      <button class="trainbtn" data-kind="fireant">
        <span class="bk">Fire Ant</span><span class="bc">🍞 70</span><span class="bh">3</span>
        <span class="bd">fast · venom</span>
      </button>
      <button class="trainbtn" data-kind="leafcutter">
        <span class="bk">Leafcutter</span><span class="bc">🍞 90</span><span class="bh">4</span>
        <span class="bd">siege buildings</span>
      </button>
    </div>
  </footer>

  <!-- ===== Scripts (order matters — config first, main last) ===== -->
  <script src="config.js"></script>
  <script src="world.js"></script>
  <script src="systems.js"></script>
  <script src="ai.js"></script>
  <script src="input.js"></script>
  <script src="render.js"></script>
  <script src="main.js"></script>
</body>
</html>
