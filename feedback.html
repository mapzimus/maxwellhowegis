<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback & Ideas | Maxwell Howe GIS</title>
    <meta name="description" content="Suggest a GIS tool idea or send feedback on existing tools built by Maxwell Howe.">
    <meta property="og:title" content="Feedback &amp; Ideas | Maxwell Howe GIS">
    <meta property="og:description" content="Suggest a GIS tool idea or send feedback on existing tools built by Maxwell Howe.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://maxwellhowegis.com/feedback.html">
    <meta property="og:image" content="https://maxwellhowegis.com/images/projects/ma-atlas-preview.png">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="canonical" href="https://maxwellhowegis.com/feedback.html">
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
    <link rel="icon" href="/favicon.ico" sizes="32x32">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<a href="#main-content" class="skip-to-content">Skip to content</a>

<div id="site-nav"></div>

<main id="main-content">
    <section class="section page-top">
        <div class="section-header fade-in">
            <div class="section-label">// Feedback</div>
            <h1 class="section-title">Tool Ideas &amp; Feedback</h1>
            <p class="section-desc">Have an idea for a GIS tool or web app? Found a bug? All ideas are read and considered for future builds.</p>
        </div>

        <div class="feedback-form-wrap fade-in fade-in-stagger">
            <form class="feedback-form" action="mailto:mhowe.gis@gmail.com" method="GET" enctype="text/plain">
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" placeholder="Tool idea, bug report, general feedback..." class="form-input">
                </div>

                <div class="form-group">
                    <label for="tool">Which tool or category?</label>
                    <select id="tool" name="tool" class="form-input form-select">
                        <option value="">Select one (optional)</option>
                        <option value="TrueScale">TrueScale</option>
                        <option value="TappyMaps">TappyMaps</option>
                        <option value="Geopuesto">Geopuesto</option>
                        <option value="Viral Map Idea Generation">Viral Map Idea Generation</option>
                        <option value="PocketTiles Studio">PocketTiles Studio</option>
                        <option value="Transit Network Map">Transit Network Map</option>
                        <option value="New idea">New tool idea</option>
                        <option value="Other">Other / General feedback</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="body">Idea or feedback <span style="color:var(--accent-teal);">*</span></label>
                    <textarea id="body" name="body" rows="6" required placeholder="Describe your idea or feedback..." class="form-input form-textarea"></textarea>
                </div>

                <div class="form-group">
                    <label for="name">Your name <span style="color:var(--text-muted); font-size:13px;">(optional)</span></label>
                    <input type="text" id="name" name="name" placeholder="How should I address my reply?" class="form-input">
                </div>

                <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">Send Idea</button>
            </form>
            <p style="color:var(--text-muted); font-size:13px; margin-top:16px; text-align:center;">Opens your email client. Alternatively, email <a href="mailto:mhowe.gis@gmail.com" style="color:var(--accent-teal);">mhowe.gis@gmail.com</a> directly.</p>
        </div>
    </section>
</main>

<div id="site-footer"></div>

<script src="js/partials.js"></script>
<script src="js/main.js"></script>
</body>
</html>
