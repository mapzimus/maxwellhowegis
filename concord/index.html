<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Open Concord — Mega Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/pmtiles@3.2.0/dist/pmtiles.js"></script>
  <style>
    html, body { margin: 0; height: 100%; font-family: system-ui, sans-serif; }
    #map { position: absolute; inset: 0; }
    #panel {
      position: absolute; top: 10px; right: 10px; max-height: 90%; overflow: auto;
      background: #fff; padding: 10px 14px; border-radius: 8px; box-shadow: 0 1px 6px rgba(0,0,0,.3);
      font-size: 13px; width: 260px;
    }
    #panel h2 { margin: 0 0 6px; font-size: 14px; }
    .grp { font-weight: 600; margin-top: 8px; text-transform: capitalize; }
    label { display: block; padding: 1px 0; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="panel"><h2>Open Concord</h2><div id="layers">loading…</div></div>
  <script>
    // Self-hosted, fully static: one PMTiles archive + a catalog.json layer index.
    const protocol = new pmtiles.Protocol();
    maplibregl.addProtocol("pmtiles", protocol.tile);
    const PM = "pmtiles://./data/concord.pmtiles";

    const map = new maplibregl.Map({
      container: "map",
      style: "https://demotiles.maplibre.org/style.json", // neutral basemap; swap as desired
      center: [-71.538, 43.207], zoom: 12
    });

    // simple per-geometry styling helper
    function addVectorLayer(srcLayer, id) {
      const t = (g => g)(srcLayer); // geometry inferred from data
      ["fill", "line", "circle"].forEach(type => {
        const layerId = `${id}-${type}`;
        const paint = type === "fill" ? { "fill-color": "#3b82f6", "fill-opacity": 0.25 }
                    : type === "line" ? { "line-color": "#1d4ed8", "line-width": 1 }
                    : { "circle-color": "#ef4444", "circle-radius": 3 };
        map.addLayer({ id: layerId, type, source: "concord", "source-layer": srcLayer,
                       paint, layout: { visibility: "none" },
                       filter: type === "fill" ? ["==", ["geometry-type"], "Polygon"]
                             : type === "line" ? ["==", ["geometry-type"], "LineString"]
                             : ["==", ["geometry-type"], "Point"] });
      });
    }

    map.on("load", async () => {
      map.addSource("concord", { type: "vector", url: PM });
      const cat = await fetch("./data/catalog.json").then(r => r.json()).catch(() => []);
      const mapLayers = cat.filter(d => d.target === "map+db");
      const groups = {};
      mapLayers.forEach(d => {
        const sl = `${d.schema_name}__${d.table_name}`;
        addVectorLayer(sl, sl);
        (groups[d.schema_name] ||= []).push({ sl, name: d.table_name });
      });
      const host = document.getElementById("layers");
      host.innerHTML = "";
      Object.entries(groups).forEach(([grp, items]) => {
        const h = document.createElement("div"); h.className = "grp"; h.textContent = grp;
        host.appendChild(h);
        items.forEach(({ sl, name }) => {
          const lab = document.createElement("label");
          lab.innerHTML = `<input type="checkbox" data-sl="${sl}"> ${name}`;
          host.appendChild(lab);
        });
      });
      host.addEventListener("change", e => {
        const sl = e.target.dataset.sl;
        const vis = e.target.checked ? "visible" : "none";
        ["fill", "line", "circle"].forEach(t => {
          if (map.getLayer(`${sl}-${t}`)) map.setLayoutProperty(`${sl}-${t}`, "visibility", vis);
        });
      });
    });
  </script>
</body>
</html>
