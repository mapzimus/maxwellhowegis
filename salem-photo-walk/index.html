<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Salem Photography Walks — Collins Middle School</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
  :root {
    --nature: #2D6A4F;
    --historic: #9C6644;
    --urban: #6A4C93;
    --train: #BC4749;
    --anchor: #1B2A41;
    --ink: #1d2733;
    --muted: #5a6675;
    --panel: rgba(255,255,255,0.96);
    --hair: rgba(20,30,45,0.10);
    --shadow: 0 2px 16px rgba(15,25,40,0.18);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: "Inter", system-ui, -apple-system, sans-serif; color: var(--ink); }
  #map { position: absolute; inset: 0; background: #e8eef2; }

  .panel { background: var(--panel); border: 1px solid var(--hair); border-radius: 12px; box-shadow: var(--shadow); backdrop-filter: blur(6px); }

  /* Title card */
  .title-card { padding: 14px 16px; max-width: 320px; }
  .title-card .brand { display: flex; align-items: center; gap: 9px; }
  .title-card .brand .dot { width: 26px; height: 26px; border-radius: 7px; background: var(--anchor); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 16px; flex: none; }
  .title-card h1 { margin: 0; font-size: 17px; font-weight: 700; letter-spacing: -0.01em; line-height: 1.15; }
  .title-card .sub { margin: 6px 0 0; font-size: 12.5px; color: var(--muted); line-height: 1.4; }
  .title-card .meta { margin: 10px 0 0; padding-top: 9px; border-top: 1px solid var(--hair); font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .title-card .meta b { color: var(--ink); font-weight: 600; }

  /* Toolbar */
  .toolbar { display: flex; gap: 6px; padding: 6px; }
  .toolbar button { font-family: inherit; font-size: 12px; font-weight: 500; color: var(--ink); background: #fff; border: 1px solid var(--hair); border-radius: 8px; padding: 7px 10px; display: inline-flex; align-items: center; gap: 6px; cursor: pointer; transition: background .12s, border-color .12s; }
  .toolbar button:hover { background: #f1f5f8; border-color: rgba(20,30,45,0.2); }
  .toolbar button:active { transform: translateY(1px); }
  .toolbar button i { font-size: 15px; }

  /* Legend */
  .legend { padding: 12px 14px; max-width: 240px; font-size: 12px; line-height: 1.3; }
  .legend h2 { margin: 0 0 8px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
  .legend .row { display: flex; align-items: center; gap: 8px; margin: 5px 0; }
  .legend .row.sub { margin-left: 2px; }
  .legend .swatch { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 0 0 1px var(--hair); flex: none; }
  .legend .bar { width: 16px; height: 11px; border-radius: 3px; flex: none; }
  .legend .sec { margin-top: 11px; padding-top: 9px; border-top: 1px solid var(--hair); }
  .legend .rail-active { width: 18px; height: 0; border-top: 3px solid #2b2b2b; position: relative; flex: none; }
  .legend .rail-active::after { content: ""; position: absolute; inset: -3px 0 0 0; border-top: 3px dotted #fff; }
  .legend .rail-freight { width: 18px; border-top: 2px dashed #8a93a0; flex: none; }
  .legend .north { display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: 700; color: var(--muted); line-height: 1; }

  /* Map pins */
  .pin { display: flex; align-items: center; justify-content: center; color: #fff; border-radius: 50%; border: 2.5px solid #fff; box-shadow: 0 1px 5px rgba(0,0,0,0.42); width: 30px; height: 30px; font-size: 15px; }
  .pin.nature { background: var(--nature); }
  .pin.historic { background: var(--historic); }
  .pin.urban { background: var(--urban); }
  .pin.train { background: var(--train); }
  .pin.anchor { width: 40px; height: 40px; font-size: 21px; background: var(--anchor); border-width: 3px; }
  .pin.approx { box-shadow: 0 0 0 3px rgba(212,160,23,0.65), 0 1px 5px rgba(0,0,0,0.42); }

  /* Popups */
  .leaflet-popup-content-wrapper { border-radius: 12px; box-shadow: var(--shadow); }
  .leaflet-popup-content { margin: 13px 15px; font-family: "Inter", sans-serif; font-size: 13px; line-height: 1.5; color: var(--ink); }
  .pp-head { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .pp-head .ic { width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; flex: none; }
  .pp-head h3 { margin: 0; font-size: 14px; font-weight: 700; line-height: 1.15; }
  .pp-chip { display: inline-block; font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; padding: 2px 7px; border-radius: 20px; }
  .pp-note { margin: 7px 0; color: #36424f; }
  .pp-meta { margin-top: 8px; padding-top: 7px; border-top: 1px solid var(--hair); font-size: 11.5px; color: var(--muted); display: flex; flex-direction: column; gap: 3px; }
  .pp-meta .ln { display: flex; align-items: center; gap: 6px; }
  .pp-meta code { font-size: 11px; background: #f1f4f7; padding: 1px 5px; border-radius: 4px; color: #36424f; cursor: pointer; }
  .pp-flag { display: inline-flex; align-items: center; gap: 5px; margin-top: 7px; font-size: 11px; font-weight: 600; color: #8a6300; background: #fdf3da; border: 1px solid #f0dca5; padding: 4px 8px; border-radius: 7px; }

  .leaflet-bar a, .leaflet-control-layers-toggle { border-radius: 8px !important; }
  .leaflet-control-layers { border-radius: 10px !important; border: 1px solid var(--hair) !important; box-shadow: var(--shadow) !important; }
  .leaflet-control-layers-expanded { padding: 10px 12px 8px !important; font-family: "Inter", sans-serif; font-size: 12.5px; }
  .leaflet-control-layers-group-name, .leaflet-control-layers label { font-weight: 500; }
  .leaflet-control-attribution { font-size: 10px !important; font-family: "Inter", sans-serif; }
  @media (max-width: 640px) {
    .title-card { max-width: 230px; padding: 11px 12px; }
    .title-card h1 { font-size: 15px; }
    .legend { max-width: 200px; }
    .toolbar button span { display: none; }
  }
</style>

/* ---------- map + basemaps ---------- */

/* ---------- walk-shed (true network isochrone, drawn as clean rings via turf) ---------- */
const SHED = { 5: "#08519C", 10: "#3182BD", 15: "#9ECAE1" };
const polyByMin = {};
ISO.features.forEach(f => { polyByMin[Math.round(f.properties.contour)] = f; });

function bandStyle(color) { return { color: color, weight: 1, opacity: 0.55, fillColor: color, fillOpacity: 0.30 }; }
const walkShed = L.layerGroup();
try {
  const ring15 = turf.difference(polyByMin[15], polyByMin[10]);
  const ring10 = turf.difference(polyByMin[10], polyByMin[5]);
  const ring5  = polyByMin[5];
  L.geoJSON(ring15, { style: bandStyle(SHED[15]) }).addTo(walkShed);
  L.geoJSON(ring10, { style: bandStyle(SHED[10]) }).addTo(walkShed);
  L.geoJSON(ring5,  { style: bandStyle(SHED[5]) }).addTo(walkShed);
} catch (e) {
  // fallback: stacked translucent fills
  [15,10,5].forEach(m => L.geoJSON(polyByMin[m], { style: bandStyle(SHED[m]) }).addTo(walkShed));
}
walkShed.addTo(map);

/* ---------- rail ---------- */
const railLayer = L.layerGroup();
const freightLayer = L.layerGroup();
RAIL.features.forEach(f => {
  if (f.properties.active) {
    // classic railway symbology: dark casing + white "ties" on top
    L.geoJSON(f, { style: { color: "#2b2b2b", weight: 4, opacity: 0.95 } }).addTo(railLayer);
    L.geoJSON(f, { style: { color: "#ffffff", weight: 3, opacity: 0.9, dashArray: "1,7", lineCap: "butt" } }).addTo(railLayer);
  } else {
    L.geoJSON(f, { style: { color: "#8a93a0", weight: 2, opacity: 0.8, dashArray: "5,5" } }).addTo(freightLayer);
  }
});
railLayer.addTo(map);

/* ---------- helpers ---------- */
function haversine(aLat, aLon, bLat, bLon) {
  const R = 6371000, toR = Math.PI/180;
  const dLat = (bLat-aLat)*toR, dLon = (bLon-aLon)*toR;
  const s = Math.sin(dLat/2)**2 + Math.cos(aLat*toR)*Math.cos(bLat*toR)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1-s));
}
function walkMin(m) { return Math.max(1, Math.round(m * 1.35 / 80)); }

function popupHTML(s, lat, lon) {
  const c = CATS[s.cat];
  const d = Math.round(haversine(COLLINS.lat, COLLINS.lon, lat, lon));
  const flag = s.approx ? `<div class="pp-flag"><i class="ti ti-map-pin-question"></i> Approximate — drag pin to the exact spot</div>` : "";
  return `
    <div class="pp-head">
      <div class="ic" style="background:${c.color}"><i class="ti ${c.icon}"></i></div>
      <h3>${s.name}</h3>
    </div>
    <span class="pp-chip" style="background:${c.color}1a;color:${c.color}">${c.label}</span>
    <p class="pp-note">${s.note}</p>
    ${flag}
    <div class="pp-meta">
      <div class="ln"><i class="ti ti-walk"></i> ~${walkMin(d)} min walk &middot; ${d} m from Collins (straight-line)</div>
      <div class="ln"><i class="ti ti-map-2"></i> <code title="Click to copy" data-coord="${lat.toFixed(6)}, ${lon.toFixed(6)}">${lat.toFixed(5)}, ${lon.toFixed(5)}</code></div>
      <div class="ln" style="opacity:.85"><i class="ti ti-database"></i> source: ${s.src}</div>
    </div>`;
}

function pinIcon(s, big) {
  const c = CATS[s.cat];
  const cls = big ? "pin anchor" : `pin ${s.cat}${s.approx ? " approx" : ""}`;
  const icon = big ? "ti-school" : c.icon;
  const size = big ? 40 : 30;
  return L.divIcon({ className: "", html: `<div class="${cls}"><i class="ti ${icon}"></i></div>`, iconSize: [size,size], iconAnchor: [size/2,size/2], popupAnchor: [0,-size/2] });
}

/* ---------- category layers + markers ---------- */
const catLayers = { nature: L.layerGroup(), historic: L.layerGroup(), urban: L.layerGroup(), train: L.layerGroup() };
const registry = [];

SPOTS.forEach(s => {
  const m = L.marker([s.lat, s.lon], { icon: pinIcon(s, false), draggable: true, autoPan: true });
  m.bindPopup(popupHTML(s, s.lat, s.lon), { maxWidth: 290, minWidth: 230 });
  m.on("dragend", e => {
    const p = e.target.getLatLng();
    m.setPopupContent(popupHTML(s, p.lat, p.lng));
    m.openPopup();
  });
  m.on("popupopen", e => {
    const code = e.popup.getElement().querySelector("code[data-coord]");
    if (code) code.addEventListener("click", () => {
      navigator.clipboard && navigator.clipboard.writeText(code.dataset.coord);
      code.textContent = "copied!";
      setTimeout(() => { code.textContent = code.dataset.coord.replace(/(-?\d+\.\d{5})\d*/g, "$1"); }, 1100);
    });
  });
  m.addTo(catLayers[s.cat]);
  registry.push({ s, m });
});
Object.values(catLayers).forEach(l => l.addTo(map));

/* Collins anchor (always on) */
const anchorLayer = L.layerGroup().addTo(map);
const anchorMarker = L.marker([COLLINS.lat, COLLINS.lon], { icon: pinIcon({cat:"anchor"}, true), zIndexOffset: 1000 })
  .bindPopup(`<div class="pp-head"><div class="ic" style="background:var(--anchor)"><i class="ti ti-school"></i></div><h3>Collins Middle School</h3></div>
    <p class="pp-note">Start and end point for every walk — 29 Highland Ave. The blue bands show how far you can actually walk along streets in 5, 10, and 15 minutes.</p>
    <div class="pp-meta"><div class="ln"><i class="ti ti-map-2"></i> <code>${COLLINS.lat.toFixed(5)}, ${COLLINS.lon.toFixed(5)}</code></div></div>`, { maxWidth: 290 })
  .addTo(anchorLayer);

/* ---------- layer control ---------- */
const baseLayers = { "Carto Light": positron, "Carto Voyager": voyager, "Satellite (scouting)": satellite, "OpenStreetMap": osm };
const overlays = {
  "<b>15-min walk-shed</b>": walkShed,
  "Commuter rail (active)": railLayer,
  "Freight / industrial track": freightLayer,
  '<span style="color:#2D6A4F">&#9679;</span> Parks / nature': catLayers.nature,
  '<span style="color:#9C6644">&#9679;</span> Historic / architecture': catLayers.historic,
  '<span style="color:#6A4C93">&#9679;</span> Urban / street': catLayers.urban,
  '<span style="color:#BC4749">&#9679;</span> Train viewpoints': catLayers.train
};
L.control.layers(baseLayers, overlays, { position: "topright", collapsed: true }).addTo(map);
L.control.scale({ position: "bottomleft", imperial: true, metric: true, maxWidth: 160 }).addTo(map);

/* ---------- fit view to walk-shed ---------- */
const shedBounds = L.geoJSON(polyByMin[15]).getBounds();
function resetView() { map.fitBounds(shedBounds, { padding: [60,60] }); }
resetView();

/* ---------- title card ---------- */
const TitleCard = L.Control.extend({
  onAdd: function() {
    const d = L.DomUtil.create("div", "panel title-card");
    d.innerHTML = `
      <div class="brand">
        <div class="dot"><i class="ti ti-camera"></i></div>
        <div>
          <h1>Salem Photography Walks</h1>
        </div>
      </div>
      <p class="sub">Walkable shooting locations from Collins Middle School — nature, historic, urban &amp; train spots.</p>
      <div class="meta"><i class="ti ti-walk"></i><span><b>17 spots</b> within a true 15-min walk &middot; LEAP Expanding Horizons &middot; Summer 2026</span></div>`;
    L.DomEvent.disableClickPropagation(d);
    return d;
  }
});
new TitleCard({ position: "topleft" }).addTo(map);

/* ---------- toolbar ---------- */
const Toolbar = L.Control.extend({
  onAdd: function() {
    const d = L.DomUtil.create("div", "panel toolbar");
    d.innerHTML = `
      <button id="btn-reset" title="Reset to walk-shed view"><i class="ti ti-focus-2"></i><span>Reset</span></button>
      <button id="btn-export" title="Download photo spots as GeoJSON"><i class="ti ti-download"></i><span>GeoJSON</span></button>
      <button id="btn-print" title="Print / save as PDF"><i class="ti ti-printer"></i><span>Print</span></button>`;
    L.DomEvent.disableClickPropagation(d);
    d.querySelector("#btn-reset").onclick = resetView;
    d.querySelector("#btn-print").onclick = () => window.print();
    d.querySelector("#btn-export").onclick = exportGeoJSON;
    return d;
  }
});
new Toolbar({ position: "topleft" }).addTo(map);

/* ---------- legend ---------- */
const Legend = L.Control.extend({
  onAdd: function() {
    const d = L.DomUtil.create("div", "panel legend");
    const catRows = Object.values(CATS).map(c =>
      `<div class="row"><span class="swatch" style="background:${c.color}"></span>${c.label}</div>`).join("");
    d.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <h2>Photo spots</h2>
        <div class="north"><i class="ti ti-arrow-up" style="font-size:15px;color:#1d2733"></i>N</div>
      </div>
      ${catRows}
      <div class="sec">
        <h2>Walk time from Collins</h2>
        <div class="row"><span class="bar" style="background:${SHED[5]};opacity:.85"></span>≤ 5 min</div>
        <div class="row"><span class="bar" style="background:${SHED[10]};opacity:.85"></span>5 – 10 min</div>
        <div class="row"><span class="bar" style="background:${SHED[15]};opacity:.9"></span>10 – 15 min</div>
      </div>
      <div class="sec">
        <h2>Rail</h2>
        <div class="row"><span class="rail-active"></span>Commuter line (active)</div>
        <div class="row"><span class="rail-freight"></span>Freight / industrial</div>
      </div>`;
    L.DomEvent.disableClickPropagation(d);
    return d;
  }
});
new Legend({ position: "bottomright" }).addTo(map);

map.attributionControl.addAttribution('Walk-shed: <a href="https://valhalla.openstreetmap.de">Valhalla/FOSSGIS</a> &middot; Geocoding: Nominatim');

/* ---------- export ---------- */
function exportGeoJSON() {
  const features = registry.map(({ s, m }) => {
    const p = m.getLatLng();
    return { type: "Feature", properties: { name: s.name, category: s.cat, note: s.note, source: s.src, approximate: !!s.approx }, geometry: { type: "Point", coordinates: [ +p.lng.toFixed(6), +p.lat.toFixed(6) ] } };
  });
  features.unshift({ type: "Feature", properties: { name: COLLINS.name, category: "anchor", note: "Start/end point — 29 Highland Ave.", source: "geocoded", approximate: false }, geometry: { type: "Point", coordinates: [ +COLLINS.lon.toFixed(6), +COLLINS.lat.toFixed(6) ] } });
  const fc = { type: "FeatureCollection", name: "salem_photo_spots", crs: { type: "name", properties: { name: "urn:ogc:def:crs:OGC:1.3:CRS84" } }, features };
  const blob = new Blob([JSON.stringify(fc, null, 2)], { type: "application/geo+json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "salem_photo_spots.geojson";
  a.click();
  URL.revokeObjectURL(a.href);
}
</script>
