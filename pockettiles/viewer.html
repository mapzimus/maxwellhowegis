<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PocketTiles Viewer</title>
    <meta name="description" content="Stream a PMTiles archive by URL — no local storage required.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%235eead4' stroke-width='2'><polygon points='3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21'/><line x1='9' y1='3' x2='9' y2='18'/><line x1='15' y1='6' x2='15' y2='21'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

    <!-- MapLibre GL JS -->
    <link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet">
    <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>

    <!-- PMTiles -->
    <script src="https://unpkg.com/pmtiles@3/dist/pmtiles.js"></script>

    <link rel="stylesheet" href="css/styles.css">
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; }
        #map { width: 100%; height: 100vh; }
        .maplibregl-popup-content {
            background: #1a2236;
            border: 1px solid #2a3550;
            color: #e8ecf4;
            border-radius: 8px;
            padding: 10px 12px;
        }
        .maplibregl-popup-tip { display: none; }
    </style>
</head>
<body>

<div id="map"></div>

<!-- Archive info overlay -->
<div class="viewer-overlay">
    <div class="label">Streaming from</div>
    <div class="url" id="archiveInfo">—</div>
    <a href="index.html" style="font-size:11px; color:var(--muted,#94a3b8); display:block; margin-top:6px;">← Back to Studio</a>
</div>

<!-- Loading notice -->
<div class="notice" id="loadingNotice">
    <div style="margin-bottom:8px;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#87c3ff" stroke-width="1.5" style="animation:spin 1.2s linear infinite;"><path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48 2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48 2.83-2.83"/></svg>
    </div>
    Loading archive…
</div>

<!-- No URL notice -->
<div class="notice" id="noUrlNotice" hidden>
    <h2>PocketTiles Viewer</h2>
    <p style="margin-top:8px;">
        Open this page with a PMTiles URL in the hash:<br>
        <code style="font-size:11px; color:#5eead4;">viewer.html#pmtiles://https://…</code>
    </p>
    <p style="margin-top:12px;">
        <a href="index.html">← Go to Studio</a> to bake and publish a map.
    </p>
</div>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>

<script type="module" src="js/viewer.js"></script>
</body>
</html>
