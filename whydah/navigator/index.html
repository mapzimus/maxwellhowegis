<!DOCTYPE html>
<html lang="en">
  <head>
<script>/* canonical-host redirect */(function(){if(/\.github\.io$/i.test(location.hostname)){location.replace("https://maxwellhowegis.com/whydah"+location.pathname.replace(/^\/Whydah-Unit/i,"")+location.search+location.hash);}})();</script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Whydah — First Sail</title>
    <meta name="description" content="First Sail — steer the Whydah north to Maine, dodge a sea serpent and enemy ships, play the navigator games for points, and survive the storm." />
    <meta name="theme-color" content="#0b1620" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text x='1' y='13' font-size='13'>%E2%9A%93</text></svg>" />
    <link rel="stylesheet" href="game.css" />
  </head>
  <body>
    <div id="game-wrap">
      <canvas id="scene" aria-label="First Sail — a sailing game. Use arrow keys to steer and space to fire."></canvas>
    </div>

    <div id="top-controls">
      <button id="btn-pause" class="mini-btn" type="button" aria-label="Pause">⏸</button>
      <button id="btn-mute" class="mini-btn" type="button" aria-label="Toggle sound">🔇</button>
    </div>

    <div id="controls" aria-hidden="true">
      <div class="ctl-cluster">
        <button id="btn-left" class="btn" type="button" aria-label="Steer left">◀</button>
        <button id="btn-right" class="btn" type="button" aria-label="Steer right">▶</button>
      </div>
      <div class="ctl-cluster">
        <button id="btn-fire" class="btn fire" type="button" aria-label="Fire">🔥</button>
      </div>
    </div>

    <p class="sr-only">First Sail is a sailing adventure game. Steer your ship north to Maine, avoid rocks and enemy fire, defeat a sea serpent, play navigator mini-games for points, and try to survive the final storm.</p>

    <script src="game.js"></script>
  </body>
</html>
