<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;600&amp;display=swap');
    </style>
  </defs>
  <!-- Background -->
  <rect width="600" height="340" fill="url(#bg)" rx="12"/>

  <!-- Hexagon icon -->
  <g transform="translate(300,110) scale(0.55)">
    <polygon points="100,5 185,52.5 185,147.5 100,195 15,147.5 15,52.5" fill="#1a6e7a" transform="translate(-100,-100)"/>
    <polygon points="100,30 165,65 165,135 100,170 35,135 35,65" fill="#2a9baa" transform="translate(-100,-100)"/>
    <g transform="translate(0,-12)">
      <path d="M0,-40 C-22,-40 -35,-22 -35,0 C-35,18 0,52 0,52 C0,52 35,18 35,0 C35,-22 22,-40 0,-40 Z" fill="white"/>
      <circle cx="0" cy="-2" r="12" fill="#2a9baa"/>
    </g>
  </g>

  <!-- mapparatus text -->
  <text x="300" y="230" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="400" letter-spacing="1">
    <tspan fill="#1a6e7a">mapp</tspan><tspan fill="#5eaab5">aratus</tspan>
  </text>

  <!-- Underline -->
  <line x1="160" y1="242" x2="440" y2="242" stroke="#5eaab5" stroke-width="1.5" opacity="0.5"/>

  <!-- Tagline -->
  <text x="300" y="268" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="rgba(255,255,255,0.5)" letter-spacing="3">simple maps, simple tools</text>

  <!-- Subtle border -->
  <rect width="598" height="338" x="1" y="1" fill="none" stroke="rgba(94,170,181,0.2)" stroke-width="1" rx="12"/>
</svg>
