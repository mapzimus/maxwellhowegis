<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lynn Data Dive | Maxwell Howe GIS</title>
    <meta name="description" content="Interactive data exploration of Lynn English High School and the 26 Massachusetts Gateway Cities. MCAS, ELL, graduation, college outcomes, finance, and more — by Maxwell Howe.">
    <meta property="og:title" content="Lynn Data Dive — Maxwell Howe">
    <meta property="og:description" content="Every public dataset for Lynn English High School and the 26 Massachusetts Gateway Cities, integrated into one interactive dashboard.">
    <meta property="og:image" content="../images/projects/lynn-thumb.png">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://maxwellhowegis.com/Lynn-data-dive/">
    <link rel="icon" type="image/svg+xml" href="../images/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* Make the iframe consume everything below the site nav */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #ffffff;
        }
        main {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 64px);  /* viewport minus site nav height */
            margin: 0;
            padding: 0;
        }
        .dashboard-frame {
            flex: 1 1 auto;
            width: 100%;
            border: none;
            display: block;
            background: #fafafa;
        }
        .dashboard-loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #455A64;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            pointer-events: none;
            z-index: 1;
        }
        .dashboard-loading-spinner {
            width: 36px; height: 36px;
            margin: 0 auto 14px;
            border: 3px solid #e0e0e0;
            border-top-color: #0A1F44;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        /* Hide skip-to-content visually but keep it accessible */
        .skip-to-content { position: absolute; left: -10000px; }
        .skip-to-content:focus { left: 0; top: 0; padding: 8px; background: #0A1F44; color: white; z-index: 1000; }
    </style>
</head>
<body>
<a href="#main-content" class="skip-to-content">Skip to content</a>

<nav class="nav">
    <div class="nav-inner">
        <a href="../index.html" class="nav-logo">Maxwell Howe</a>
        <ul class="nav-links" id="navLinks">
            <li><a href="../about.html">About</a></li>
            <li><a href="../portfolio.html">Projects</a></li>
            <li><a href="../gallery.html">Map Gallery</a></li>
            <li><a href="../side-projects.html">Beyond GIS</a></li>
            <li><a href="../contact.html">Contact</a></li>
        </ul>
        <button class="nav-hamburger" id="hamburger" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
    </div>
</nav>

<main id="main-content">
    <div class="dashboard-loading" id="dashboardLoading" aria-hidden="true">
        <div class="dashboard-loading-spinner"></div>
        Loading…
    </div>
    <iframe
        class="dashboard-frame"
        id="dashboardFrame"
        src="https://lehs-data-dive-xxs7apjjjctcjaswhlzgeu.streamlit.app/?embed=true&embed_options=show_toolbar"
        onload="document.getElementById('dashboardLoading').style.display='none'"
        allow="fullscreen; clipboard-read; clipboard-write"
        title="Lynn Data Dive">
    </iframe>
</main>

<script src="../js/main.js"></script>
</body>
</html>
