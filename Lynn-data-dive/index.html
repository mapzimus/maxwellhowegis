<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lynn Data Dive | Maxwell Howe GIS</title>
    <meta name="description" content="Interactive data exploration of Lynn English High School and the 26 Massachusetts Gateway Cities. MCAS, ELL, graduation, college outcomes, finance, and more — by Maxwell Howe.">
    <meta property="og:title" content="Lynn Data Dive — Maxwell Howe">
    <meta property="og:description" content="Every public dataset for Lynn English High School and the 26 Massachusetts Gateway Cities, integrated into one interactive dashboard.">
    <meta property="og:image" content="../images/projects/lynn-thumb.png">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://maxwellhowegis.com/Lynn-data-dive/">
    <link rel="icon" type="image/svg+xml" href="../images/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* Full-bleed: iframe owns the entire viewport, no portfolio nav strap */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #ffffff;
            font-family: 'Inter', sans-serif;
        }
        main {
            display: block;
            position: fixed;
            inset: 0;
            margin: 0;
            padding: 0;
        }
        .dashboard-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background: #fafafa;
        }
        .dashboard-loading {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #455A64;
            font-size: 14px;
            pointer-events: none;
            z-index: 1;
        }
        .dashboard-loading-spinner {
            width: 36px; height: 36px;
            margin: 0 auto 14px;
            border: 3px solid #e0e0e0;
            border-top-color: #0A1F44;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        /* Tiny "back to portfolio" pill in the bottom-right corner —
           subtle, doesn't interfere with the dashboard chrome */
        .back-pill {
            position: fixed;
            bottom: 12px;
            left: 12px;
            z-index: 50;
            padding: 6px 12px;
            background: rgba(10, 31, 68, 0.85);
            color: #FFB81C;
            font-size: 11px;
            font-weight: 500;
            text-decoration: none;
            border-radius: 16px;
            border: 1px solid rgba(255, 184, 28, 0.25);
            backdrop-filter: blur(6px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            transition: opacity 0.2s, transform 0.15s;
            opacity: 0.45;
        }
        .back-pill:hover {
            opacity: 1;
            transform: translateY(-1px);
        }
        @media (max-width: 768px) {
            .back-pill { bottom: 8px; left: 8px; font-size: 10px; padding: 5px 10px; }
        }
    </style>
</head>
<body>
<main id="main-content">
    <div class="dashboard-loading" id="dashboardLoading" aria-hidden="true">
        <div class="dashboard-loading-spinner"></div>
        Loading…
    </div>
    <iframe
        class="dashboard-frame"
        id="dashboardFrame"
        src="https://lehs-data-dive-xxs7apjjjctcjaswhlzgeu.streamlit.app/?embed=true&embed_options=show_toolbar"
        onload="document.getElementById('dashboardLoading').style.display='none'"
        allow="fullscreen; clipboard-read; clipboard-write"
        title="Lynn Data Dive">
    </iframe>
    <a href="../portfolio.html" class="back-pill" title="Back to Maxwell Howe portfolio">
        ↩ portfolio
    </a>
</main>
</body>
</html>
