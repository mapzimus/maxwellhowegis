<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lynn Data Dive | Maxwell Howe</title>
  <meta name="description" content="An interactive, integrated data exploration of Lynn English High School and the 26 Massachusetts Gateway Cities. Built by Maxwell Howe.">
  <link rel="canonical" href="https://maxwellhowegis.com/lynndata/">
  <meta property="og:title" content="LEHS Data Dive — Lynn English High School">
  <meta property="og:description" content="Demographics, MCAS, ELL pipeline, graduation, college outcomes, finance, teacher workforce, discipline, community context, maps, and cross-domain correlation analysis for Lynn English High School.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://maxwellhowegis.com/lynndata/">

  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fafafa;
    }

    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 36px;
      background: #0A1F44;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      font-size: 13px;
      z-index: 100;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }
    .topbar a {
      color: #FFB81C;
      text-decoration: none;
      font-weight: 500;
    }
    .topbar a:hover { text-decoration: underline; }
    .topbar .title { font-weight: 600; }

    .frame-wrap {
      position: fixed;
      top: 36px;
      left: 0;
      right: 0;
      bottom: 0;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #455A64;
      z-index: 1;
    }
    .loading-spinner {
      width: 32px; height: 32px;
      margin: 0 auto 12px;
      border: 3px solid #e0e0e0;
      border-top-color: #0A1F44;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .mobile-note {
      display: none;
      position: fixed;
      bottom: 8px; left: 8px; right: 8px;
      padding: 8px 12px;
      background: rgba(255, 184, 28, 0.95);
      color: #0A1F44;
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
      z-index: 50;
    }
    @media (max-width: 768px) {
      .mobile-note { display: block; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <span class="title">📊 Lynn Data Dive</span>
    <span>
      <a href="https://maxwellhowegis.com">← Back to maxwellhowegis.com</a>
    </span>
  </div>

  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
    Loading dashboard…
  </div>

  <div class="frame-wrap">
    <!--
      Railway hosts the always-on Streamlit backend. The public browser URL
      remains https://maxwellhowegis.com/lynndata/.
      Append ?embed=true to hide the Streamlit menu/footer.
      Master copy of this file lives at:
      mapzimus/lehs-data-dive → deploy/maxwellhowegis-Lynn-data-dive.html
    -->
    <iframe
      id="lehs-frame"
      src="https://lehs-data-dive-production.up.railway.app/?embed=true"
      onload="document.getElementById('loading').style.display='none'"
      allow="fullscreen"
      title="LEHS Data Dive">
    </iframe>
  </div>

  <div class="mobile-note">
    Best viewed on a desktop or tablet — the dashboard has many charts that need width.
  </div>

</body>
</html>
